<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KENTO Trading Video Gids</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0d1117; color: #e6edf3;
  font-family: 'Segoe UI', system-ui, sans-serif;
  min-height: 100vh; display: flex; flex-direction: column; align-items: center;
  padding: 20px;
}
.header {
  display: flex; align-items: center; gap: 14px; margin-bottom: 24px; width: 100%; max-width: 960px;
}
.header .icon {
  width: 36px; height: 36px; background: linear-gradient(135deg,#2196F3,#00bcd4);
  border-radius: 9px; display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: 900; color: #fff; flex-shrink: 0;
}
.header h1 { font-size: 20px; font-weight: 800; color: #e6edf3; }
.header p { font-size: 13px; color: #8b949e; margin-top: 2px; }
.back-btn {
  margin-left: auto; background: #21262d; border: 1px solid #30363d;
  border-radius: 7px; padding: 6px 16px; font-size: 13px; color: #8b949e;
  cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 6px;
}
.back-btn:hover { border-color: #2196F3; color: #2196F3; }

.player-wrap {
  width: 100%; max-width: 960px;
  background: #161b22; border-radius: 16px; border: 1px solid #21262d;
  overflow: hidden; box-shadow: 0 24px 80px rgba(0,0,0,.6);
}
#mainCanvas {
  width: 100%; display: block; cursor: pointer;
  background: #0d1117;
}
.controls {
  padding: 14px 20px 16px; background: #161b22; border-top: 1px solid #21262d;
  display: flex; align-items: center; gap: 14px;
}
#playBtn {
  width: 38px; height: 38px; border-radius: 50%;
  background: linear-gradient(135deg,#2196F3,#00bcd4);
  border: none; cursor: pointer; font-size: 14px; color: #fff;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: transform .15s; box-shadow: 0 4px 14px rgba(33,150,243,.4);
}
#playBtn:hover { transform: scale(1.08); }
.slider-wrap { flex: 1; position: relative; }
#timeSlider {
  width: 100%; height: 4px; -webkit-appearance: none; appearance: none;
  background: #21262d; border-radius: 2px; outline: none; cursor: pointer;
}
#timeSlider::-webkit-slider-thumb {
  -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%;
  background: #2196F3; cursor: pointer; box-shadow: 0 0 0 3px rgba(33,150,243,.3);
}
#timeSlider::-webkit-slider-runnable-track { border-radius: 2px; }
.time-display { font-size: 13px; color: #8b949e; font-variant-numeric: tabular-nums; flex-shrink: 0; width: 90px; text-align: right; }
.chapter-label { font-size: 12px; color: #2196F3; flex-shrink: 0; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.chapters {
  width: 100%; max-width: 960px; margin-top: 20px;
  display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 8px;
}
.chapter-btn {
  background: #161b22; border: 1px solid #21262d; border-radius: 8px;
  padding: 9px 14px; cursor: pointer; text-align: left; transition: all .15s;
  color: #8b949e; font-size: 12px;
}
.chapter-btn:hover { border-color: #2196F3; color: #e6edf3; }
.chapter-btn.active { border-color: #2196F3; background: rgba(33,150,243,.08); color: #2196F3; }
.chapter-btn .ch-num { font-size: 10px; color: #30363d; margin-bottom: 3px; }
.chapter-btn .ch-title { font-weight: 600; font-size: 12px; }
.chapter-btn .ch-time { font-size: 10px; color: #30363d; margin-top: 2px; }
.chapter-btn.active .ch-num, .chapter-btn.active .ch-time { color: rgba(33,150,243,.5); }
#voiceBtn {
  background: #21262d; border: 1px solid #30363d; border-radius: 20px;
  padding: 5px 14px; font-size: 12px; color: #8b949e; cursor: pointer;
  transition: all .2s; flex-shrink: 0; display: flex; align-items: center; gap: 6px;
  white-space: nowrap;
}
#voiceBtn:hover { border-color: #FF9800; color: #FF9800; }
#voiceBtn.active { border-color: #FF9800; background: rgba(255,152,0,.12); color: #FF9800; }
#voiceBtn.active::before { content:''; display:inline-block; width:7px; height:7px; background:#FF9800; border-radius:50%; animation: pulse 1.2s infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.7)} }
.subtitle-bar {
  padding: 8px 20px; background: rgba(13,17,23,.9);
  border-top: 1px solid #21262d; min-height: 36px;
  display: flex; align-items: center; justify-content: center;
}
.subtitle-bar p { font-size: 13px; color: #e6edf3; text-align: center; line-height: 1.5; font-style: italic; opacity: .85; }
</style>
</head>
<body>

<div class="header">
  <div class="icon">K</div>
  <div>
    <h1>KENTO Trading Video Gids</h1>
    <p>Complete visuele uitleg · ~5 minuten · 18 hoofdstukken · Geen geluid</p>
  </div>
  <a class="back-btn" href="KENTO_SUITE_App.html">← Terug naar Doc App</a>
</div>

<div class="player-wrap">
  <canvas id="mainCanvas" width="960" height="540"></canvas>
  <div class="controls">
    <button id="playBtn">▶</button>
    <div class="slider-wrap">
      <input type="range" id="timeSlider" min="0" max="300" value="0" step="0.1">
    </div>
    <span class="chapter-label" id="chapterLabel">Intro</span>
    <span class="time-display" id="timeDisplay">0:00 / 5:00</span>
    <button id="voiceBtn" title="Voice-over aan/uit">🔇 Voice-over</button>
  </div>
  <div class="subtitle-bar"><p id="subtitleText">Druk op ▶ om te beginnen</p></div>
</div>

<div class="chapters" id="chaptersGrid"></div>

<script>
const W = 960, H = 540;
const TOTAL = 300;

// ── Palette ─────────────────────────────────────
const C = {
  bg: '#0d1117', bg2: '#161b22', bg3: '#21262d', bg4: '#30363d',
  accent: '#2196F3', teal: '#00bcd4', green: '#089981', red: '#F23645',
  orange: '#FF9800', yellow: '#ffc107', white: '#e6edf3', gray: '#8b949e',
  purple: '#9c27b0', lime: '#00c853'
};

// ── Math helpers ─────────────────────────────────
const clamp = (v,a,b) => Math.max(a, Math.min(b, v));
const lerp  = (a,b,t) => a+(b-a)*clamp(t,0,1);
const ease  = t => t<.5 ? 2*t*t : -1+(4-2*t)*t;
const easeO = t => 1-Math.pow(1-clamp(t,0,1),3);
const easeI = t => Math.pow(clamp(t,0,1),2);
const seg   = (p, s, e) => clamp((p-s)/(e-s), 0, 1); // slice of p between s..e

// ── Canvas draw helpers ───────────────────────────
function rr(ctx, x, y, w, h, r, fill, stroke, sw=1) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r); ctx.closePath();
  if(fill){ctx.fillStyle=fill;ctx.fill();}
  if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=sw;ctx.stroke();}
}
function txt(ctx, s, x, y, size, col, align='center', weight='600') {
  ctx.font = `${weight} ${size}px 'Segoe UI',sans-serif`;
  ctx.fillStyle = col; ctx.textAlign = align;
  ctx.fillText(s, x, y);
}
function atxt(ctx, s, x, y, size, col, a, align='center', weight='600') {
  ctx.save(); ctx.globalAlpha = clamp(a,0,1);
  txt(ctx, s, x, y, size, col, align, weight);
  ctx.restore();
}
function line(ctx, x1,y1,x2,y2, col, w=1, dash=[]) {
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2);
  ctx.strokeStyle=col; ctx.lineWidth=w; ctx.setLineDash(dash); ctx.stroke(); ctx.setLineDash([]);
}
function animLine(ctx, x1,y1,x2,y2, p, col, w=1, dash=[]) {
  line(ctx, x1,y1, lerp(x1,x2,p), lerp(y1,y2,p), col, w, dash);
}
function candle(ctx, cx, top, bot, high, low, bull, cw=14) {
  const col = bull ? C.green : C.red;
  ctx.strokeStyle=col; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(cx,high); ctx.lineTo(cx,low); ctx.stroke();
  ctx.fillStyle=col;
  const h = Math.max(Math.abs(bot-top),2);
  ctx.fillRect(cx-cw/2, Math.min(top,bot), cw, h);
}
function labelBox(ctx, text, x, y, bg, fg, a, sz=13, pad=8) {
  ctx.save(); ctx.globalAlpha=clamp(a,0,1);
  ctx.font=`600 ${sz}px 'Segoe UI',sans-serif`;
  const mw = ctx.measureText(text).width;
  rr(ctx, x-mw/2-pad, y-sz, mw+pad*2, sz+pad, 5, bg);
  ctx.fillStyle=fg; ctx.textAlign='center'; ctx.fillText(text, x, y);
  ctx.restore();
}
function arrow(ctx, x1,y1,x2,y2, col, a) {
  ctx.save(); ctx.globalAlpha=clamp(a,0,1);
  const angle = Math.atan2(y2-y1,x2-x1);
  const len = 12;
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.strokeStyle=col; ctx.lineWidth=2; ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x2,y2);
  ctx.lineTo(x2-len*Math.cos(angle-.4), y2-len*Math.sin(angle-.4));
  ctx.lineTo(x2-len*Math.cos(angle+.4), y2-len*Math.sin(angle+.4));
  ctx.closePath(); ctx.fillStyle=col; ctx.fill();
  ctx.restore();
}
function gradBG(ctx) {
  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#0d1117'); g.addColorStop(1,'#0a0f14');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
}
function gridBG(ctx, alpha=0.04) {
  ctx.save(); ctx.globalAlpha=alpha;
  ctx.strokeStyle='#ffffff'; ctx.lineWidth=.5;
  for(let x=0;x<W;x+=60){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=60){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  ctx.restore();
}

// ── Chart helper ──────────────────────────────────
function makeChart(minP, maxP, l=70, r=820, t=90, b=430) {
  const ch=b-t, cw=r-l;
  return {
    l,r,t,b,ch,cw,
    pY: p => t+ch*(1-(p-minP)/(maxP-minP)),
    bX: (i,n) => l+(i+.5)*cw/n
  };
}
function chartGrid(ctx, ch, steps=5) {
  ctx.save(); ctx.globalAlpha=.15; ctx.strokeStyle='#ffffff'; ctx.lineWidth=.5;
  ctx.setLineDash([2,4]);
  for(let i=0;i<=steps;i++){
    const y=ch.t+i*ch.ch/steps;
    ctx.beginPath();ctx.moveTo(ch.l,y);ctx.lineTo(ch.r,y);ctx.stroke();
  }
  ctx.setLineDash([]); ctx.restore();
}

// ── Candle data sets ──────────────────────────────
// Normalised prices 0-100, format [o,c,h,l]
const CD_STRUCTURE = [
  [38,44,46,36],[44,42,45,40],[42,50,52,41],[50,47,52,46],[47,55,57,45],
  [55,52,56,50],[52,60,62,51],[60,58,62,57],[58,65,67,56],[65,62,66,60],
  [62,56,64,54],[56,53,58,52],[53,48,55,46],[48,44,50,42],[44,40,46,38],
];
const CD_BOS = [
  [40,45,47,38],[45,43,46,41],[43,50,52,42],[50,48,51,46],[48,55,56,47],
  [55,52,56,50],[52,58,59,50],[58,62,63,56],[62,60,63,59],[60,70,71,59],// BOS
  [70,68,72,67],[68,74,75,66],[74,72,76,70],
];
const CD_CHOCH = [
  [40,46,48,38],[46,52,53,44],[52,49,54,47],[49,55,57,48],[55,58,59,53],
  [58,54,59,52],[54,50,55,49],[50,46,51,44],[46,40,47,39],// CHoCH
];
const CD_OB = [
  [42,48,50,40],[48,45,49,43],[45,52,54,44],[52,49,53,47],[49,58,59,48],
  [58,55,59,54],[55,52,56,50],[52,48,54,46],[48,56,57,47],// BOS → OB on prev candle
  [56,60,62,54],[60,65,66,58],
];
const CD_FVG = [
  [50,56,57,48],[56,52,57,50],[52,62,64,50],// gap: candle[0].h=57 < candle[2].l=50 — BULLISH FVG
];
const CD_IDM = [
  [55,60,61,53],[60,57,61,55],[57,55,58,50], // sweep low
  [55,62,63,54],// rejection up
  [62,68,69,60],[68,65,70,63],
];
const CD_FLOW = [
  [44,50,52,42],[50,47,51,45],[47,55,56,46],[55,52,56,50],[52,60,61,51],
  [60,57,61,55],[57,65,66,56],[65,62,66,60],[62,68,69,61],
];
const CD_BUYER = [
  [50,55,57,48],[55,52,56,50],[52,48,54,46],[48,44,50,42],[44,40,46,38],
  [40,37,42,35],[37,42,44,36],[42,50,51,41],[50,58,59,49],[58,65,66,57],
  [65,70,72,63],[70,75,76,68],
];
const CD_SELLER = [
  [60,55,62,53],[55,58,60,53],[58,65,66,56],[65,68,69,63],[68,62,69,60],
  [62,58,63,56],[58,52,59,50],[52,47,54,45],[47,42,48,40],[42,38,44,36],
];
const CD_SCALPER = [
  [44,50,52,42],[50,47,51,45],[47,55,56,46],[55,52,56,50],[52,48,53,46],
  [48,56,57,47],[56,60,61,54],[60,58,62,56],[58,65,66,57],[65,62,66,60],
  [62,68,69,61],[68,65,70,63],[65,70,71,64],[70,67,72,65],[67,72,73,66],
];

// ── Transition overlay ────────────────────────────
function sceneTransition(ctx, p) {
  const a = p < .08 ? easeO(p/.08) : p > .92 ? easeO(1-(p-.92)/.08) : 1;
  ctx.save(); ctx.globalAlpha = 1-a; ctx.fillStyle='#0d1117'; ctx.fillRect(0,0,W,H); ctx.restore();
}

// ── Scene title ───────────────────────────────────
function sceneTitle(ctx, title, subtitle, p) {
  const a = easeO(seg(p,0,.12));
  atxt(ctx, title, W/2, 58, 22, C.white, a, 'center', '700');
  if(subtitle) atxt(ctx, subtitle, W/2, 80, 13, C.gray, a);
  ctx.save(); ctx.globalAlpha=a*.3;
  ctx.strokeStyle=C.accent; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(W/2-200,90); ctx.lineTo(W/2+200,90); ctx.stroke();
  ctx.restore();
}

// ════════════════════════════════════════════════════
// SCENE 01 — INTRO (0–4s)
// ════════════════════════════════════════════════════
function s01(ctx, p) {
  gradBG(ctx); gridBG(ctx, .03);
  // Glow circle
  ctx.save();
  const g = ctx.createRadialGradient(W/2,H/2,0, W/2,H/2,260);
  g.addColorStop(0,`rgba(33,150,243,${.12*easeO(p)})`);
  g.addColorStop(1,'rgba(33,150,243,0)');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H); ctx.restore();

  // Icon box
  const a1 = easeO(seg(p,0,.2));
  ctx.save(); ctx.globalAlpha=a1;
  rr(ctx, W/2-32, H/2-96, 64, 64, 16, 'rgba(33,150,243,0.15)', C.accent, 1.5);
  txt(ctx,'K', W/2, H/2-46, 32, C.accent);
  ctx.restore();

  // Main title
  atxt(ctx,'KENTO TRADING SUITE', W/2, H/2+10, 38, C.white, easeO(seg(p,.1,.4)),'center','800');
  atxt(ctx,'Complete Handleiding — Van Basics Tot Geavanceerde Setup', W/2, H/2+42, 14, C.gray, easeO(seg(p,.25,.55)));

  // Badges
  const ba = easeO(seg(p,.4,.7));
  const badges = ['18 Hoofdstukken','~5 Minuten','100% Visueel','Nederlandstalig'];
  badges.forEach((b,i)=>{
    const bx = W/2 - (badges.length-1)*80 + i*160;
    ctx.save(); ctx.globalAlpha=ba;
    rr(ctx,bx-56,H/2+66,112,26,13,'rgba(33,150,243,.1)','rgba(33,150,243,.25)',1);
    txt(ctx,b,bx,H/2+84,12,C.accent);
    ctx.restore();
  });

  // Press play hint
  atxt(ctx,'▶  Druk op Play om te beginnen', W/2, H-36, 13, C.gray, easeO(seg(p,.6,1))*(.5+.5*Math.sin(Date.now()*.003)));
}

// ════════════════════════════════════════════════════
// SCENE 02 — CANDLESTICKS (4–15s)
// ════════════════════════════════════════════════════
function s02(ctx, p) {
  gradBG(ctx);
  sceneTitle(ctx,'Stap 1: Candlesticks begrijpen','Wat is een candlestick?', p);

  const cx = W/2, baseY = 290, cw = 44, bodyH = 100, wick = 40;

  // Bullish candle
  const a1 = easeO(seg(p,.1,.3));
  const bulla = easeO(seg(p,.12,.35));
  ctx.save(); ctx.globalAlpha=bulla;
  // body draws up
  const bh = lerp(0, bodyH, easeO(seg(p,.12,.32)));
  ctx.fillStyle=C.green; ctx.fillRect(cx-180-cw/2, baseY+2-bh, cw, bh);
  // wick
  if(p>.28){
    const wa = easeO(seg(p,.28,.4));
    ctx.globalAlpha=wa; ctx.strokeStyle=C.green; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(cx-180, baseY-bodyH-wick*(easeO(seg(p,.28,.38)))); ctx.lineTo(cx-180, baseY+2); ctx.stroke();
  }
  ctx.restore();

  // Bearish candle
  const bera = easeO(seg(p,.3,.55));
  ctx.save(); ctx.globalAlpha=bera;
  const brh = lerp(0, bodyH, easeO(seg(p,.3,.5)));
  ctx.fillStyle=C.red; ctx.fillRect(cx+180-cw/2, baseY-bodyH+brh-bodyH, cw, brh);
  if(p>.48){
    const wa2 = easeO(seg(p,.48,.6));
    ctx.globalAlpha=wa2; ctx.strokeStyle=C.red; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(cx+180, baseY-bodyH*2+wick*(easeO(seg(p,.48,.58)))); ctx.lineTo(cx+180, baseY+wick); ctx.stroke();
  }
  ctx.restore();

  // Labels bullish
  const la = easeO(seg(p,.35,.55));
  const labels_bull = [
    { txt:'High (Wick)', x:cx-248, y:baseY-bodyH-wick+8 },
    { txt:'Close (Body top)', x:cx-248, y:baseY-bodyH+8 },
    { txt:'Open (Body bot)', x:cx-248, y:baseY+8 },
    { txt:'Low (Wick)', x:cx-248, y:baseY+40 },
  ];
  labels_bull.forEach(l => {
    atxt(ctx, l.txt, l.x, l.y, 11, C.green, la, 'right','400');
    ctx.save(); ctx.globalAlpha=la*.4; ctx.strokeStyle=C.green; ctx.lineWidth=.5; ctx.setLineDash([2,3]);
    ctx.beginPath(); ctx.moveTo(cx-245,l.y-4); ctx.lineTo(cx-160,l.y-4); ctx.stroke(); ctx.setLineDash([]); ctx.restore();
  });

  // Labels bearish
  const lb2 = easeO(seg(p,.52,.72));
  const labels_bear = [
    { txt:'High', x:cx+248, y:baseY-bodyH*2+8 },
    { txt:'Open (top)', x:cx+248, y:baseY-bodyH*2+wick+8 },
    { txt:'Close (bot)', x:cx+248, y:baseY-bodyH+wick+8 },
    { txt:'Low', x:cx+248, y:baseY+wick+8 },
  ];
  labels_bear.forEach(l => {
    atxt(ctx, l.txt, l.x, l.y, 11, C.red, lb2, 'left','400');
  });

  // Captions
  atxt(ctx,'BULLISH CANDLE', cx-180, baseY+72, 13, C.green, easeO(seg(p,.4,.6)),'center','700');
  atxt(ctx,'(Prijs ging omhoog)', cx-180, baseY+90, 11, C.gray, easeO(seg(p,.45,.65)));
  atxt(ctx,'BEARISH CANDLE', cx+180, baseY+72, 13, C.red, easeO(seg(p,.55,.75)),'center','700');
  atxt(ctx,'(Prijs ging omlaag)', cx+180, baseY+90, 11, C.gray, easeO(seg(p,.6,.8)));

  // Bottom tip
  const ta = easeO(seg(p,.7,1));
  rr(ctx, W/2-280, H-76, 560, 38, 8, `rgba(33,150,243,${.08*ta})`, `rgba(33,150,243,${.2*ta})`, 1);
  atxt(ctx,'💡  Elke candle = één tijdsperiode (bijv. 1 uur of 1 dag)', W/2, H-52, 12, C.white, ta);
}

// ════════════════════════════════════════════════════
// SCENE 03 — MARKT STRUCTUUR (15–28s)
// ════════════════════════════════════════════════════
function s03(ctx, p) {
  gradBG(ctx);
  sceneTitle(ctx,'Markt Structuur','Hoe lees je de richting van de markt?', p);
  const ch = makeChart(30, 80, 80, W-80, 105, 440);
  chartGrid(ctx, ch);

  // Draw candles progressively (uptrend first 8, downtrend last 7)
  const n = Math.floor(lerp(1, CD_STRUCTURE.length, easeO(seg(p,.1,.7))));
  CD_STRUCTURE.slice(0,n).forEach((c,i) => {
    const x = ch.bX(i, CD_STRUCTURE.length);
    const bull = c[1]>=c[0];
    candle(ctx, x, ch.pY(c[0]), ch.pY(c[1]), ch.pY(c[2]), ch.pY(c[3]), bull, 22);
  });

  // Labels on uptrend
  if(p>.3){
    const la = easeO(seg(p,.3,.5));

  if(p>.55){

      if(i < n){
        const x = ch.bX(i,CD_STRUCTURE.length);
        labelBox(ctx,label, x, ch.pY(price)-16, C.red+'44', C.red, la2, 11);
      }

    [[11,53,'LL'],[13,44,'LL']].forEach(([i,price,label]) => {

  atxt(ctx,'Bullish BOS: sluit boven swing high  |  Bearish BOS: sluit onder swing low', W/2, H-34, 11, C.gray, ea*.8);
}

// SCENE 07 — PREMIUM / DISCOUNT (72–88s)
// ════════════════════════════════════════════════════
function s07(ctx, p) {
  gradBG(ctx);
  sceneTitle(ctx,'Premium & Discount Zones','Wanneer is iets duur of goedkoop?', p);
  const ch = makeChart(30, 80, 100, W-80, 105, 440);
  chartGrid(ctx, ch);

  const mid = ch.pY(55); // midpoint

  // Zones fade in
  if(p>.1){
    const za = easeO(seg(p,.1,.35));
    ctx.save(); ctx.globalAlpha=.12*za;
    ctx.fillStyle=C.red; ctx.fillRect(ch.l, ch.t, ch.cw, mid-ch.t);
    ctx.fillStyle=C.green; ctx.fillRect(ch.l, mid, ch.cw, ch.b-mid);
    ctx.restore();
    // Midline
    ctx.save(); ctx.globalAlpha=za;
    ctx.strokeStyle=C.yellow; ctx.lineWidth=1.5; ctx.setLineDash([6,4]);
    ctx.beginPath(); ctx.moveTo(lerp(ch.r,ch.l,1-za*easeO(seg(p,.1,.35))),mid); ctx.lineTo(ch.r,mid); ctx.stroke();
    ctx.setLineDash([]); ctx.restore();
    // Zone labels
    atxt(ctx,'PREMIUM (verkopen)', W/2, mid-24, 15, C.red, za,'center','700');
    atxt(ctx,'Boven 50% = duur', W/2, mid-6, 11, C.red+'cc', za);
    atxt(ctx,'DISCOUNT (kopen)', W/2, mid+20, 15, C.green, za,'center','700');
    atxt(ctx,'Onder 50% = goedkoop', W/2, mid+38, 11, C.green+'cc', za);
  }

  // Fib 0.5 label
  if(p>.3){
    const la = easeO(seg(p,.3,.5));
    labelBox(ctx,'0.500  (50%)', ch.r-10, mid, C.yellow+'33', C.yellow, la, 11);
  }

  // Price arrow going down into discount
  if(p>.55){
    const pa = easeO(seg(p,.55,.75));
    const startX = ch.bX(3, 8), startY = mid-60;
    const endX = ch.bX(5, 8), endY = mid+80;
    arrow(ctx, lerp(startX,startX,pa), lerp(startY,startY,pa), lerp(startX,endX,pa), lerp(startY,endY,pa), C.green, pa);
    labelBox(ctx,'Entry hier!', endX+30, lerp(startY,endY,pa), C.green+'88', C.white, pa, 11);
  }

  // Rule
  const ra = easeO(seg(p,.72,1));
  rr(ctx, 60, H-72, W-120, 38, 8, `rgba(33,150,243,${.08*ra})`,`rgba(33,150,243,${.2*ra})`,1);
  atxt(ctx,'🎯  Koop in Discount zone — Verkoop/Short in Premium zone', W/2, H-48, 13, C.white, ra);
}

// SCENE 08 — FIBONACCI ZONES (88–105s)
// ════════════════════════════════════════════════════
function s08(ctx, p) {
  gradBG(ctx);
  sceneTitle(ctx,'Fibonacci Zones','De exacte Buy Zone & Sell Zone', p);
  const ch = makeChart(28, 78, 100, W-100, 105, 450);
  chartGrid(ctx, ch);

  // Fib levels
  const fibs = [
    { level:0.0,   price:75, label:'0.0',   col:C.yellow },
    { level:0.236, price:69, label:'0.236', col:C.red    },
    { level:0.382, price:63, label:'0.382', col:C.red    },
    { level:0.500, price:58, label:'0.500', col:C.yellow },
    { level:0.618, price:52, label:'0.618', col:C.green  },
    { level:0.786, price:43, label:'0.786', col:C.green  },
    { level:1.0,   price:33, label:'1.0',   col:C.yellow },
  ];

  fibs.forEach((f,i)=>{
    const da = easeO(seg(p, .08+i*.06, .15+i*.06));
    ctx.save(); ctx.globalAlpha=da;
    ctx.strokeStyle=f.col+'99'; ctx.lineWidth=1; ctx.setLineDash([4,3]);
    ctx.beginPath(); ctx.moveTo(ch.l, ch.pY(f.price)); ctx.lineTo(ch.r, ch.pY(f.price)); ctx.stroke();
    ctx.setLineDash([]);
    txt(ctx, f.label, ch.r+8, ch.pY(f.price)+4, 11, f.col,'left','400');
    ctx.restore();
  });

  // Buy zone box
  if(p>.45){
    const za = easeO(seg(p,.45,.62));
    ctx.save(); ctx.globalAlpha=.18*za;
    ctx.fillStyle=C.green;
    ctx.fillRect(ch.l, ch.pY(52), ch.cw, ch.pY(43)-ch.pY(52));
    ctx.restore();
    ctx.save(); ctx.globalAlpha=za;
    ctx.strokeStyle=C.green+'88'; ctx.lineWidth=1.5;
    ctx.strokeRect(ch.l, ch.pY(52), ch.cw, ch.pY(43)-ch.pY(52));
    ctx.restore();
    atxt(ctx,'BUY ZONE', W/2, (ch.pY(52)+ch.pY(43))/2+5, 14, C.lime, za,'center','700');
    atxt(ctx,'0.618 – 0.786', W/2, (ch.pY(52)+ch.pY(43))/2+22, 11, C.green, za);
  }

  // Sell zone box
  if(p>.6){
    const za = easeO(seg(p,.6,.77));
    ctx.save(); ctx.globalAlpha=.15*za;
    ctx.fillStyle=C.orange;
    ctx.fillRect(ch.l, ch.pY(69), ch.cw, ch.pY(63)-ch.pY(69));
    ctx.restore();
    ctx.save(); ctx.globalAlpha=za;
    ctx.strokeStyle=C.orange+'88'; ctx.lineWidth=1.5;
    ctx.strokeRect(ch.l, ch.pY(69), ch.cw, ch.pY(63)-ch.pY(69));
    ctx.restore();
    atxt(ctx,'SELL ZONE', W/2, (ch.pY(69)+ch.pY(63))/2+5, 14, C.orange, za,'center','700');
    atxt(ctx,'0.236 – 0.382', W/2, (ch.pY(69)+ch.pY(63))/2+22, 11, C.orange, za);
  }

  // Entry dots
  if(p>.72){
    const da = easeO(seg(p,.72,.88));
    const entryY = ch.pY(48);
    ctx.save(); ctx.globalAlpha=da;
    ctx.fillStyle=C.lime;
    ctx.beginPath(); ctx.arc(W/2, entryY, 8, 0, Math.PI*2); ctx.fill();
    atxt(ctx,'LONG ENTRY', W/2, entryY-18, 12, C.lime, da,'center','700');
    ctx.restore();
  }
}

// ════════════════════════════════════════════════════
// SCENE 10 — FAIR VALUE GAPS (120–135s)
// ════════════════════════════════════════════════════
function s10(ctx, p) {
  gradBG(ctx);
  sceneTitle(ctx,'Fair Value Gaps (FVG)','Prijs laat een "gat" achter in de markt', p);

  // 3 large candles centered
  const cx = W/2, baseY = 280, cw = 60, scale = 180;
  const prices = CD_FVG;
  const minP=40, maxP=68, rng=maxP-minP;
  const pY = pr => baseY + scale*(1-(pr-minP)/rng) - scale/2;

  const n = Math.min(3, Math.floor(lerp(.1,3.5, easeO(seg(p,.1,.55)))));

  // Positions
  const xs = [cx-180, cx, cx+180];
  for(let i=0;i<n;i++){
    const c = prices[i];
    const a = easeO(seg(p, .1+i*.14, .18+i*.14));
    ctx.save(); ctx.globalAlpha=a;
    candle(ctx, xs[i], pY(c[0]), pY(c[1]), pY(c[2]), pY(c[3]), c[1]>=c[0], cw);
    ctx.restore();
  }

  // FVG box between candle 0 high (57) and candle 2 low (50)
  if(p>.5){
    const fa = easeO(seg(p,.5,.7));
    const top = pY(57), bot = pY(50);
    // Animated width expand
    const bw = lerp(0, 600, easeO(seg(p,.5,.7)));
    ctx.save(); ctx.globalAlpha=.25*fa;
    ctx.fillStyle=C.accent; ctx.fillRect(cx-bw/2, top, bw, bot-top);
    ctx.restore();
    ctx.save(); ctx.globalAlpha=fa;
    ctx.strokeStyle=C.accent+'99'; ctx.lineWidth=1; ctx.setLineDash([4,3]);
    ctx.beginPath(); ctx.moveTo(cx-bw/2,top); ctx.lineTo(cx+bw/2,top); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx-bw/2,bot); ctx.lineTo(cx+bw/2,bot); ctx.stroke();
    ctx.setLineDash([]);
    atxt(ctx,'FVG', cx-300, (top+bot)/2+5, 16, C.accent, fa,'center','700');
    atxt(ctx,'Gap', cx, (top+bot)/2+5, 14, C.accent, fa,'center','700');
    ctx.restore();
    // Arrows showing gap
    const aa = easeO(seg(p,.65,.82));
    atxt(ctx,'▲ Candle 3 opent hier', cx+130, bot+10, 11, C.white, aa,'left','400');
    atxt(ctx,'▼ Candle 1 sluit hier',  cx+130, top+10, 11, C.white, aa,'left','400');
  }

  // Explanation
  const ea = easeO(seg(p,.72,1));
  rr(ctx, 60, H-80, W-120, 46, 8, `rgba(33,150,243,${.07*ea})`,`rgba(33,150,243,${.2*ea})`,1);
  atxt(ctx,'FVG = Candle 1 high overlapt NIET met candle 3 low → prijs "vergat" dit niveau', W/2, H-54, 13, C.white, ea);
  atxt(ctx,'Prijs keert vaak terug naar een FVG om het te vullen → sterk support/resistance', W/2, H-36, 11, C.gray, ea*.8);
}

  { id:'fvg',       start:120, end:135, label:'Fair Value Gaps',     fn:s10 },
  { id:'idm',       start:135, end:150, label:'Inducement (IDM)',    fn:s11 },
  { id:'flow',      start:150, end:165, label:'Orderflow & HVN',     fn:s12 },
  { id:'buyersltp', start:165, end:185, label:'Buyer SL/TP',         fn:s13 },
  { id:'sellersltp',start:185, end:205, label:'Seller SL/TP',        fn:s14 },
  { id:'combined',  start:205, end:235, label:'Complete Setup',      fn:s15 },
  { id:'scalper',   start:235, end:255, label:'Scalper Signalen',    fn:s16 },
  { id:'routine',   start:255, end:275, label:'Dagelijkse Routine',  fn:s17 },
  { id:'outro',     start:275, end:300, label:'Afsluiting',          fn:s18 },
];

function fmtTime(s) {
  const m=Math.floor(s/60), sec=Math.floor(s%60);
  return `${m}:${sec.toString().padStart(2,'0')}`;
}

// ── Player engine ─────────────────────────────────
const canvas = document.getElementById('mainCanvas');
const ctx    = canvas.getContext('2d');
const playBtn    = document.getElementById('playBtn');
const slider     = document.getElementById('timeSlider');
const timeDsp    = document.getElementById('timeDisplay');
const chapterLbl = document.getElementById('chapterLabel');
const chapGrid   = document.getElementById('chaptersGrid');

let curTime  = 0;
let playing  = false;
let lastRAF  = null;
let lastStamp= null;

function getScene(t) {
  return SCENES.find(s => t >= s.start && t < s.end) || SCENES[SCENES.length-1];
}

function renderFrame() {
  const sc = getScene(curTime);
  const sp = clamp((curTime - sc.start) / (sc.end - sc.start), 0, 1);

  // Cross-fade transition: fade in first 0.3s, fade out last 0.3s of scene
  const fadeDur = 0.3;
  let transA = 1;
  const localT = curTime - sc.start;
  const dur = sc.end - sc.start;
  if(localT < fadeDur) transA = easeO(localT/fadeDur);
  else if(localT > dur-fadeDur) transA = easeO((dur-localT)/fadeDur);

  ctx.clearRect(0,0,W,H);
  sc.fn(ctx, sp);

  // Fade overlay
  if(transA < 1) {
    ctx.save();
    ctx.globalAlpha = 1-transA;
    ctx.fillStyle='#0d1117';
    ctx.fillRect(0,0,W,H);
    ctx.restore();
  }

  // Update UI
  slider.value = curTime;
  timeDsp.textContent = `${fmtTime(curTime)} / ${fmtTime(TOTAL)}`;
  chapterLbl.textContent = sc.label;

  // Highlight active chapter
  document.querySelectorAll('.chapter-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.id === sc.id);
  });

  // Voice-over: trigger per scene
  if (playing && typeof voiceEnabled !== 'undefined' && voiceEnabled) {
    speak(sc.id);
  }
}

function tick(stamp) {
  if(!playing) return;
  if(lastStamp) {
    const dt = (stamp - lastStamp) / 1000;
    curTime = Math.min(curTime + dt, TOTAL);
  }
  lastStamp = stamp;
  renderFrame();
  if(curTime >= TOTAL) {
    playing = false;
    playBtn.textContent = '↩';
    lastStamp = null;
    return;
  }
  lastRAF = requestAnimationFrame(tick);
}

function togglePlay() {
  if(curTime >= TOTAL) { curTime=0; }
  playing = !playing;
  if(playing) {
    playBtn.textContent = '⏸';
    lastStamp = null;
    lastRAF = requestAnimationFrame(tick);
  } else {
    playBtn.textContent = '▶';
    lastStamp = null;
    cancelAnimationFrame(lastRAF);
  }
}

playBtn.addEventListener('click', togglePlay);
canvas.addEventListener('click', togglePlay);

slider.addEventListener('input', () => {
  curTime = parseFloat(slider.value);
  if(!playing) renderFrame();
});

// Build chapter buttons
SCENES.forEach((sc,i) => {
  const btn = document.createElement('button');
  btn.className = 'chapter-btn';
  btn.dataset.id = sc.id;
  btn.innerHTML = `<div class="ch-num">H${String(i+1).padStart(2,'0')}</div>
    <div class="ch-title">${sc.label}</div>
    <div class="ch-time">${fmtTime(sc.start)} – ${fmtTime(sc.end)}</div>`;
  btn.addEventListener('click', () => {
    curTime = sc.start;
    if(!playing) renderFrame();
  });
  chapGrid.appendChild(btn);
});

// Initial render
renderFrame();

// ══════════════════════════════════════════════════════

// ══════════════════════════════════════════════════════

let voiceEnabled  = false;
let lastSpokenId  = null;
let dutchVoice    = null;
const voiceBtn    = document.getElementById('voiceBtn');
const subtitleEl  = document.getElementById('subtitleText');

// Robuste voice loader — Chrome laadt stemmen asynchroon
function findDutchVoice() {
  const all = speechSynthesis.getVoices();
  // Zoek exacte nl-NL stem, dan elke nl stem
  return all.find(v => v.lang === 'nl-NL')
      || all.find(v => v.lang === 'nl-BE')
      || all.find(v => v.lang.startsWith('nl'))
      || null;
}

// Probeer direct + via event (Chrome heeft de voices pas na het event)
dutchVoice = findDutchVoice();
speechSynthesis.addEventListener('voiceschanged', () => {
  dutchVoice = findDutchVoice();
});

function speak(sceneId) {
  if (!voiceEnabled) return;
  if (lastSpokenId === sceneId) return;
  lastSpokenId = sceneId;

  const text = VOICEOVER[sceneId];
  if (!text) return;

  // Herlaad stem als die nog niet gevonden was
  if (!dutchVoice) dutchVoice = findDutchVoice();

  speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);

  // Altijd nl-NL forceren — ook zonder stem object spreekt de browser Dutch
  utt.lang   = 'nl-NL';
  if (dutchVoice) utt.voice = dutchVoice;
  utt.rate   = 0.90;
  utt.pitch  = 1.0;
  utt.volume = 1.0;

  subtitleEl.textContent = text;
  utt.onend = () => { if (voiceEnabled) subtitleEl.textContent = ''; };
  utt.onerror = (e) => { if (e.error !== 'interrupted' && e.error !== 'canceled') console.warn('Speech error:', e.error); };
  speechSynthesis.speak(utt);
}

function stopVoice() {
  speechSynthesis.cancel();
  lastSpokenId = null;
  subtitleEl.textContent = '';
}

// Voice button toggle
voiceBtn.addEventListener('click', () => {
  voiceEnabled = !voiceEnabled;
  if (voiceEnabled) {
    voiceBtn.textContent = '🔊 Voice-over';
    voiceBtn.classList.add('active');
    lastSpokenId = null; // force re-speak current scene
    if (playing) speak(getScene(curTime).id);
    else subtitleEl.textContent = 'Voice-over ingeschakeld — druk ▶ om te beginnen';
  } else {
    voiceBtn.textContent = '🔇 Voice-over';
    voiceBtn.classList.remove('active');
    stopVoice();
    subtitleEl.textContent = 'Voice-over uitgeschakeld';
  }
});

// Stop voice when pausing or scrubbing
playBtn.addEventListener('click', () => {
  if (playing) stopVoice(); // was playing, now pausing
});
slider.addEventListener('mousedown', () => { stopVoice(); lastSpokenId = null; });
slider.addEventListener('touchstart', () => { stopVoice(); lastSpokenId = null; });

// Chapter jump also resets voice
document.querySelectorAll('.chapter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    stopVoice();
    lastSpokenId = null;
    if (playing && voiceEnabled) {
      setTimeout(() => speak(getScene(curTime).id), 300);
    }
  });
});
</script>
